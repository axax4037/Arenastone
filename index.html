<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>山石診所｜智慧庫存管理</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js" defer></script>
  <style>
    :root{--blue:#2563eb;--red:#dc2626;--green:#16a34a;--amber:#d97706;--ink:#1e293b;--line:#dbe3ee}*{box-sizing:border-box}body{margin:0;background:#f1f5f9;color:var(--ink);font:15px system-ui,-apple-system,"Microsoft JhengHei",sans-serif;padding-bottom:70px}header{background:#fff;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);padding:14px 18px;display:flex;justify-content:space-between;align-items:center}.wrap{max-width:1100px;margin:auto;padding:18px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat,.panel,.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}.stat b{font-size:25px;color:var(--blue)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}input,select,textarea,button{font:inherit;border:1px solid #bac7d8;border-radius:8px;padding:9px}input,select,textarea{width:100%;background:#fff}button{cursor:pointer;background:#fff;font-weight:700}button.primary{background:var(--blue);color:white;border-color:var(--blue)}button.danger{color:var(--red)}button:disabled{opacity:.55;cursor:not-allowed}.hidden{display:none!important}.cards{display:grid;gap:12px}.card.low{border-left:5px solid var(--red)}.card-top{display:flex;justify-content:space-between;gap:14px}.muted{color:#64748b;font-size:13px}.batches{margin-top:10px;border-top:1px solid var(--line)}.batch{display:grid;grid-template-columns:1.4fr 1fr auto;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #eef2f7}.focus{background:#fffbeb;border-radius:8px;padding:9px}.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px;padding:10px;z-index:10}.view{display:none}.view.active{display:block}.form{max-width:620px;margin:auto;display:grid;gap:12px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{font-size:13px;font-weight:700;display:grid;gap:5px}.scanner{background:#111827;border-radius:12px;overflow:hidden;min-height:160px;padding:4px}.scanner video{width:100%;max-height:160px;object-fit:cover}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:30;color:#fff;padding:11px 18px;border-radius:8px;background:#334155;box-shadow:0 5px 18px #0004}.toast.error{background:var(--red)}.toast.success{background:var(--green)}.modal{position:fixed;inset:0;background:#0008;display:grid;place-items:center;z-index:20}.modal>div{background:#fff;padding:22px;border-radius:12px;width:min(390px,92vw)}#login{z-index:40}.notice{padding:10px;border-radius:8px;background:#eff6ff;color:#1d4ed8}.actions{display:flex;gap:8px;flex-wrap:wrap}.batch input{max-width:105px}@media(max-width:700px){.grid{grid-template-columns:repeat(2,1fr)}.batch{grid-template-columns:1fr auto}.batch .actions{grid-column:1/-1}.two{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div id="toastBox"></div>
<div id="login" class="modal"><div><h2>山石智慧庫存登入</h2><p class="muted">請使用試算表 Users 工作表中的帳號。</p><div class="form"><label>帳號<input id="account" autocomplete="username"></label><label>密碼<input id="password" type="password" autocomplete="current-password"></label><button class="primary" id="loginBtn">登入</button></div></div></div>
<header><strong>山石診所｜智慧庫存</strong><span id="userTag" class="muted">未登入</span></header>
<main class="wrap">
  <section id="dashboard" class="view active">
    <div class="grid"><div class="stat">品項數<br><b id="total">-</b></div><div class="stat">今日已盤點<br><b id="today">-</b></div><div class="stat">待盤點<br><b id="pending">-</b></div><div class="stat">低庫存<br><b id="low">-</b></div></div>
    <div class="panel" style="margin-top:14px"><div class="toolbar"><button class="primary" id="homeScanBtn">開啟掃碼盤點</button><span class="muted">掃描後會定位到對應批次；同品項同效期會合併顯示。</span></div><div id="homeScanPanel" class="hidden"><div id="homeReader" class="scanner"></div></div></div>
    <div class="panel" style="margin-top:14px"><div class="toolbar"><input id="search" placeholder="搜尋品名、ID、批號" style="flex:2"><select id="category"><option value="">全部分類</option></select><label style="display:flex;align-items:center;gap:4px"><input id="lowOnly" type="checkbox" style="width:auto">僅低庫存</label></div></div>
    <div id="cards" class="cards" style="margin-top:14px"></div>
  </section>
  <section id="operation" class="view"><div class="panel"><h2>掃碼作業</h2><div class="toolbar"><button data-mode="inbound" class="mode primary">入庫</button><button data-mode="outbound" class="mode">領用</button><button data-mode="stocktake" class="mode">盤點</button><button id="startScan">啟動掃描</button></div><div id="reader" class="scanner hidden"></div><p id="scanStatus" class="muted">尚未掃描條碼</p><div id="scanForm" class="form hidden"><label>品項 ID<input id="scanId" readonly></label><label>品名<input id="scanName"></label><label id="scanBatchLabel">批次<select id="scanBatch"></select></label><div id="scanInboundFields" class="two"><label>批號 (LOT)<input id="scanLot"></label><label>有效日期<input id="scanExpiry" type="date"></label><label>單價<input id="scanPrice" type="number" min="0"></label></div><label>數量<input id="scanQty" type="number" min="0" inputmode="numeric"></label><label>備註<textarea id="scanNote" rows="2"></textarea></label><div class="actions"><button id="scanSubmit" class="primary">送出作業</button><button id="scanCancel">放棄重掃</button></div></div></div></section>
  <section id="manual" class="view"><div class="panel"><h2>手動作業</h2><div class="form"><label>作業類型<select id="manualType"><option value="入庫">入庫</option><option value="領用">領用</option><option value="盤點">盤點</option></select></label><label>品項 ID／條碼<input id="manualId" list="ids"><datalist id="ids"></datalist></label><label>品名<input id="manualName"></label><label id="manualBatchLabel" class="hidden">選擇批次<select id="manualBatch"></select></label><div id="manualInboundFields" class="two"><label>批號<input id="manualLot"></label><label>有效日期<input id="manualExpiry" type="date"></label><label>單價<input id="manualPrice" type="number" min="0"></label></div><label>數量<input id="manualQty" type="number" min="0" inputmode="numeric"></label><label>備註<textarea id="manualNote" rows="2"></textarea></label><button id="manualSubmit" class="primary">送出作業</button></div></div></section>
  <section id="report" class="view"><div class="panel"><h2>庫存報表</h2><div id="reportBody"></div></div></section>
</main>
<nav class="nav"><button data-tab="dashboard">首頁／盤點</button><button data-tab="operation">掃碼作業</button><button data-tab="manual">手動作業</button><button data-tab="report">報表</button></nav>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbypbBGczyPbjs0nd_d0NasMaXi0UjZjspq3VhWuCb6LsJyXhMPI5FGSWRUBE1nME35TPA/exec';
let state={items:[],user:'',mode:'inbound',scanner:null,homeScanner:null,lastScan:0};
window.state=state;
const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function toast(message,type='error'){const e=document.createElement('div');e.className='toast '+type;e.textContent=message;$('toastBox').append(e);setTimeout(()=>e.remove(),2800)}
function iso(v){if(!v)return '';const m=String(v).match(/(\d{4})[-/]?(\d{2})[-/]?(\d{2})/);return m?`${m[1]}-${m[2]}-${m[3]}`:''}
function validQty(v){return v!==''&&Number.isFinite(Number(v))&&Number(v)>=0}
async function request(payload){let res;try{res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});const text=await res.text();let data;try{data=JSON.parse(text)}catch{data={success:res.ok,error:text||'伺服器未回傳可辨識資料'}};if(!res.ok||!data.success)throw Error(data.error||`伺服器錯誤 (${res.status})`);return data}catch(e){throw Error(e.message||'連線失敗')}}
async function load(){try{const res=await fetch(API_URL,{cache:'no-store'});const data=await res.json();if(!res.ok||data.success===false)throw Error(data.error||`伺服器錯誤 (${res.status})`);state.items=Array.isArray(data.items)?data.items:[];render()}catch(e){toast('無法載入庫存：'+e.message)}}
function byItem(){const map=new Map;for(const x of state.items){const key=x.id+'|'+iso(x.expiry);if(!map.has(key))map.set(key,{...x,qty:0,batches:[]});const g=map.get(key);g.qty+=Number(x.qty)||0;g.batches.push(x)}return [...map.values()]}
function render(){const groups=byItem(),today=iso(new Date()),week=new Date(Date.now()-7*864e5);const cats=[...new Set(state.items.map(x=>x.category).filter(Boolean))];$('category').innerHTML='<option value="">全部分類</option>'+cats.map(x=>`<option>${esc(x)}</option>`).join('');$('ids').innerHTML=[...new Set(state.items.map(x=>x.id))].map(x=>`<option value="${esc(x)}">`).join('');$('total').textContent=new Set(state.items.map(x=>x.id)).size;$('today').textContent=groups.filter(x=>iso(x.last_stocktake)===today).length;$('pending').textContent=groups.filter(x=>!x.last_stocktake||new Date(x.last_stocktake)<week).length;$('low').textContent=groups.filter(x=>x.qty<=Number(x.min_qty||0)).length;renderCards()}
function renderCards(){const q=$('search').value.trim().toLowerCase(),cat=$('category').value,low=$('lowOnly').checked;let groups=byItem().filter(x=>(!q||[x.id,x.name,x.lot].join(' ').toLowerCase().includes(q))&&(!cat||x.category===cat)&&(!low||x.qty<=Number(x.min_qty||0)));$('cards').innerHTML=groups.length?groups.map((x,i)=>`<article class="card ${x.qty<=Number(x.min_qty||0)?'low':''}" id="card-${i}"><div class="card-top"><div><strong>${esc(x.name)}</strong><div class="muted">ID：${esc(x.id)}　分類：${esc(x.category||'未分類')}</div></div><div><b>${x.qty}</b><span class="muted"> / 安全 ${x.min_qty||0}</span></div></div><div class="batches"><div class="batch"><div>批號：${esc(x.lot||'未填')}<br><span class="muted">效期：${esc(x.expiry||'未填')}｜最後盤點：${esc(x.last_stocktake||'未盤點')}</span></div><input id="qty-${i}" type="number" min="0" value="${x.qty}" disabled><div class="actions"><button onclick="beginStocktake(${i})">開始盤點</button><button onclick="saveStocktake(${i})" id="save-${i}" class="primary hidden">儲存</button><button onclick="endStocktake(${i})" id="end-${i}" class="hidden">結束</button></div></div></div></article>`).join(''):'<div class="panel muted">沒有符合條件的庫存。</div>';window.displayGroups=groups}
function beginStocktake(i){const card=$('card-'+i),input=$('qty-'+i);card.classList.add('focus');input.disabled=false;input.focus();$('save-'+i).classList.remove('hidden');$('end-'+i).classList.remove('hidden')}
function endStocktake(i){$('card-'+i).classList.remove('focus');$('qty-'+i).disabled=true;$('save-'+i).classList.add('hidden');$('end-'+i).classList.add('hidden')}
async function saveStocktake(i){const x=window.displayGroups[i],qty=$('qty-'+i).value;if(!validQty(qty))return toast('請輸入正確的實盤數量');const b=$('save-'+i);b.disabled=true;try{await request({type:'盤點',id:x.id,lot:x.lot,expiry:x.expiry,qty:Number(qty),user:state.user,note:'[首頁卡片盤點]'});toast('盤點已儲存','success');await load();endStocktake(i)}catch(e){toast('盤點失敗：'+e.message)}finally{b.disabled=false}}
function choices(id){return state.items.filter(x=>x.id===id&&Number(x.qty)>0).sort((a,b)=>(iso(a.expiry)||'9999').localeCompare(iso(b.expiry)||'9999'))}
function populate(select,id){const list=choices(id);select.innerHTML=list.map(x=>`<option value="${esc(JSON.stringify({lot:x.lot,expiry:iso(x.expiry)}))}">批號 ${esc(x.lot||'未填')}｜效期 ${esc(x.expiry||'未填')}｜剩餘 ${x.qty}</option>`).join('');return list}
function scanModeUI(){const inbound=state.mode==='inbound';$('scanInboundFields').classList.toggle('hidden',!inbound);$('scanBatchLabel').classList.toggle('hidden',inbound);$('scanName').readOnly=!inbound;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('primary',b.dataset.mode===state.mode))}
async function stopScanner(which){const key=which==='home'?'homeScanner':'scanner';const s=state[key];state[key]=null;if(s)try{await s.stop();await s.clear()}catch(_){}}
async function startOperationScanner(){await stopScanner('main');$('reader').classList.remove('hidden');const qr=new Html5Qrcode('reader');state.scanner=qr;try{await qr.start({facingMode:'environment'},{fps:12,qrbox:{width:250,height:110}},code=>onOperationCode(code),()=>{});$('scanStatus').textContent='掃描中…'}catch(e){await stopScanner('main');$('reader').classList.add('hidden');toast('鏡頭無法啟動：'+e.message)}}
async function onOperationCode(code){if(Date.now()-state.lastScan<1000)return;state.lastScan=Date.now();const matches=state.items.filter(x=>x.id===code);if(state.mode!=='inbound'&&!matches.length){toast('條碼錯誤：沒有此庫存品項');return}await stopScanner('main');$('reader').classList.add('hidden');$('scanId').value=code;$('scanForm').classList.remove('hidden');const first=matches[0];$('scanName').value=first?.name||'';$('scanPrice').value=first?.price||'';$('scanLot').value='';$('scanExpiry').value='';$('scanQty').value='';$('scanNote').value='';if(state.mode!=='inbound'&&!populate($('scanBatch'),code)){toast('此品項沒有可用批次')}$('scanStatus').textContent='已讀取：'+code}
function selectedBatch(select){try{return JSON.parse(select.value)}catch{return null}}
async function submitScan(){const id=$('scanId').value,qty=$('scanQty').value;if(!id||!validQty(qty))return toast('請掃描條碼並輸入正確數量');let lot,expiry;if(state.mode==='inbound'){lot=$('scanLot').value.trim();expiry=$('scanExpiry').value}else{const b=selectedBatch($('scanBatch'));if(!b)return toast('請選擇庫存批次');({lot,expiry}=b)}const type={inbound:'入庫',outbound:'領用',stocktake:'盤點'}[state.mode],btn=$('scanSubmit');btn.disabled=true;try{await request({type,id,name:$('scanName').value.trim(),lot,expiry,qty:Number(qty),price:$('scanPrice').value,user:state.user,note:`[掃碼${type}] ${$('scanNote').value.trim()}`});toast(type+'已完成','success');$('scanForm').classList.add('hidden');await load()}catch(e){toast('提交失敗：'+e.message)}finally{btn.disabled=false}}
function manualUI(){const inbound=$('manualType').value==='入庫';$('manualInboundFields').classList.toggle('hidden',!inbound);$('manualBatchLabel').classList.toggle('hidden',inbound);$('manualName').readOnly=!inbound;fillManual()}
function fillManual(){const id=$('manualId').value.trim(),first=state.items.find(x=>x.id===id),inbound=$('manualType').value==='入庫';$('manualName').value=first?.name||'';$('manualPrice').value=first?.price||'';if(!inbound)populate($('manualBatch'),id)}
async function submitManual(){const type=$('manualType').value,id=$('manualId').value.trim(),qty=$('manualQty').value;if(!id||!validQty(qty))return toast('請輸入品項 ID 與正確數量');let lot,expiry;if(type==='入庫'){lot=$('manualLot').value.trim();expiry=$('manualExpiry').value}else{const b=selectedBatch($('manualBatch'));if(!b)return toast('請選擇有效庫存批次');({lot,expiry}=b)}const btn=$('manualSubmit');btn.disabled=true;try{await request({type,id,name:$('manualName').value.trim(),lot,expiry,qty:Number(qty),price:$('manualPrice').value,user:state.user,note:`[手動${type}] ${$('manualNote').value.trim()}`});toast(type+'已完成','success');['manualId','manualName','manualLot','manualExpiry','manualPrice','manualQty','manualNote'].forEach(x=>$(x).value='');$('manualBatch').innerHTML='';await load()}catch(e){toast('提交失敗：'+e.message)}finally{btn.disabled=false}}
async function toggleHomeScan(){if(state.homeScanner){await stopScanner('home');$('homeScanPanel').classList.add('hidden');$('homeScanBtn').textContent='開啟掃碼盤點';return}$('homeScanPanel').classList.remove('hidden');const qr=new Html5Qrcode('homeReader');state.homeScanner=qr;try{await qr.start({facingMode:'environment'},{fps:12,qrbox:{width:250,height:110}},async code=>{if(Date.now()-state.lastScan<1000)return;state.lastScan=Date.now();const g=byItem().find(x=>x.id===code);if(!g)return toast('條碼錯誤：首頁沒有此品項');await stopScanner('home');$('homeScanPanel').classList.add('hidden');$('homeScanBtn').textContent='開啟掃碼盤點';$('search').value=code;renderCards();setTimeout(()=>{const c=$('card-0');if(c){c.scrollIntoView({behavior:'smooth',block:'center'});beginStocktake(0)}},50)},()=>{});$('homeScanBtn').textContent='關閉掃碼盤點'}catch(e){state.homeScanner=null;$('homeScanPanel').classList.add('hidden');toast('鏡頭無法啟動：'+e.message)}}
function renderReport(){const items=byItem(),now=new Date(),soon=new Date(now);soon.setMonth(soon.getMonth()+1);const exp=items.filter(x=>x.expiry&&new Date(x.expiry)>=now&&new Date(x.expiry)<=soon&&x.qty>0),low=items.filter(x=>x.qty<=Number(x.min_qty||0));$('reportBody').innerHTML=`<h3>一個月內到期</h3>${exp.length?exp.map(x=>`<p>${esc(x.name)}｜${esc(x.expiry)}｜剩餘 ${x.qty}</p>`).join(''):'<p class="muted">無。</p>'}<h3>低庫存</h3>${low.length?low.map(x=>`<p>${esc(x.name)}｜目前 ${x.qty}／安全 ${x.min_qty||0}</p>`).join(''):'<p class="muted">無。</p>'}`}
$('loginBtn').onclick=async()=>{const b=$('loginBtn');b.disabled=true;try{const r=await request({action:'login',account:$('account').value.trim(),password:$('password').value});state.user=r.name;$('userTag').textContent='👤 '+r.name;$('login').classList.add('hidden');await load()}catch(e){toast('登入失敗：'+e.message)}finally{b.disabled=false}};$('password').onkeydown=e=>{if(e.key==='Enter')$('loginBtn').click()};document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));$(b.dataset.tab).classList.add('active');if(b.dataset.tab==='report')renderReport()});document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;scanModeUI()});$('startScan').onclick=startOperationScanner;$('scanSubmit').onclick=submitScan;$('scanCancel').onclick=()=>{$('scanForm').classList.add('hidden');$('scanStatus').textContent='尚未掃描條碼'};$('manualType').onchange=manualUI;$('manualId').oninput=fillManual;$('manualSubmit').onclick=submitManual;$('homeScanBtn').onclick=toggleHomeScan;['search','category','lowOnly'].forEach(id=>$(id).addEventListener(id==='lowOnly'?'change':'input',renderCards));scanModeUI();manualUI();
</script>
<script src="stocktake.js"></script>
<script src="commercial.js"></script>
</body>
</html>
