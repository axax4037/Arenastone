<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖星診所庫存管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: all 0.3s ease; }
        .status-ok { border-left: 5px solid #10b981; }
        .status-warn { border-left: 5px solid #f59e0b; }
        .status-err { border-left: 5px solid #ef4444; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: #6b7280; cursor: pointer; }
        .nav-item.active { color: #3b82f6; font-weight: bold; }
        .nav-item i { font-size: 1.25rem; margin-bottom: 4px; }
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: white; margin: 10% auto; padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; transition: opacity 0.2s; text-align: center; cursor: pointer; border: none; }
        .btn:active { opacity: 0.7; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-success { background-color: #10b981; color: white; }
        .btn-danger { background-color: #ef4444; color: white; }
        .input-field { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .badge-low { background-color: #fee2e2; color: #ef4444; }
        .loading { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f3f4f6; z-index: 100; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <!-- 登入畫面 -->
    <div id="login-screen">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center mb-6 text-gray-800"><i class="fas fa-clinic-medical text-blue-500"></i> 聖星診所</h2>
            <p class="text-center text-gray-500 mb-6 text-sm">庫存管理系統</p>
            <input type="text" id="login-account" class="input-field" placeholder="帳號 (代號)">
            <input type="password" id="login-password" class="input-field" placeholder="密碼">
            <button onclick="handleLogin()" class="btn btn-primary w-full py-3 text-lg">登入</button>
            <p id="login-error" class="text-red-500 text-sm mt-3 text-center hidden"></p>
            <p class="text-xs text-gray-400 mt-6 text-center">預設帳號：admin / 密碼：1234</p>
        </div>
    </div>

    <!-- 主應用程式 (預設隱藏) -->
    <div id="app-container" class="hidden">
        <header class="bg-white shadow-sm sticky top-0 z-40">
            <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-800"><i class="fas fa-boxes text-blue-500 mr-2"></i>庫存管理</h1>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-600 hidden sm:inline">歡迎，<span id="user-display-name" class="font-bold"></span></span>
                    <button onclick="logout()" class="text-xs text-red-500 border border-red-200 px-2 py-1 rounded hover:bg-red-50">登出</button>
                </div>
            </div>
        </header>

        <main class="max-w-5xl mx-auto px-4 py-6">
            
            <!-- 庫存頁面 -->
            <div id="page-inventory" class="page-section">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-gray-700">庫存明細</h2>
                    <button onclick="openNewItemModal()" class="bg-blue-500 text-white px-3 py-1 rounded-lg text-sm shadow"><i class="fas fa-plus"></i> 新增</button>
                </div>
                
                <div class="mb-4 flex gap-2">
                    <input type="text" id="searchInput" placeholder="搜尋品項、ID、批號..." class="input-field mb-0 flex-1" onkeyup="renderInventory()">
                    <select id="filterCategory" class="input-field mb-0 w-32" onchange="renderInventory()">
                        <option value="">全部分類</option>
                    </select>
                </div>

                <div id="inventoryList" class="space-y-3">
                    <div class="loading"></div>
                </div>
            </div>

            <!-- 掃碼頁面 -->
            <div id="page-scan" class="page-section hidden">
                <h2 class="text-lg font-bold text-gray-700 mb-4">掃碼作業</h2>
                <div class="card p-4 text-center">
                    <div id="reader" class="mb-4 bg-black rounded-lg overflow-hidden"></div>
                    <p class="text-gray-500 mb-4">將鏡頭對準條碼或 QR Code</p>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="startScan('in')" class="btn btn-success"><i class="fas fa-arrow-down"></i> 掃碼入庫</button>
                        <button onclick="startScan('out')" class="btn btn-danger"><i class="fas fa-arrow-up"></i> 掃碼領用</button>
                    </div>
                    <button onclick="stopScan()" class="mt-4 text-gray-500 underline text-sm">停止掃描</button>
                </div>
            </div>

            <!-- 報表頁面 -->
            <div id="page-reports" class="page-section hidden">
                <h2 class="text-lg font-bold text-gray-700 mb-4">進銷存報表</h2>
                <div class="card p-4">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <span class="font-bold">本月統計</span>
                        <span class="text-xs text-gray-500" id="reportDateRange"></span>
                    </div>
                    <div id="reportContent">
                        <div class="loading"></div>
                    </div>
                    <button onclick="sendMonthlyReport()" class="btn btn-primary w-full mt-4"><i class="fas fa-envelope"></i> 發送月報 Email</button>
                </div>
                
                <h3 class="font-bold text-gray-700 mt-6 mb-2">作業日誌</h3>
                <div class="card overflow-hidden">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-gray-50 text-gray-600">
                            <tr>
                                <th class="p-3">時間</th>
                                <th class="p-3">類型</th>
                                <th class="p-3">品項</th>
                                <th class="p-3">數量</th>
                                <th class="p-3">經手人</th>
                            </tr>
                        </thead>
                        <tbody id="logList"></tbody>
                    </table>
                </div>
            </div>

            <!-- 設定頁面 -->
            <div id="page-settings" class="page-section hidden">
                <h2 class="text-lg font-bold text-gray-700 mb-4">系統設定</h2>
                <div class="card p-4 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Google Sheet ID</label>
                        <div class="bg-gray-100 p-2 rounded text-gray-600 font-mono text-sm break-all">1yW1a5bmSTGsHhQlLE1T2-cj1bsM8YdKAMtMV-rY2_mk</div>
                        <p class="text-xs text-green-600 mt-1"><i class="fas fa-check-circle"></i> 已自動連結</p>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">月報收件信箱</label>
                        <input type="email" id="settingEmail" class="input-field" placeholder="example@gmail.com">
                        <button onclick="saveSettings()" class="btn btn-primary w-full">儲存 Email 設定</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部導航 -->
        <nav class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 shadow-lg z-50 pb-safe">
            <div class="max-w-5xl mx-auto flex justify-around items-center h-16">
                <div class="nav-item active" onclick="switchPage('inventory', this)">
                    <i class="fas fa-boxes"></i>
                    <span>庫存</span>
                </div>
                <div class="nav-item" onclick="switchPage('scan', this)">
                    <i class="fas fa-qrcode"></i>
                    <span>掃碼</span>
                </div>
                <div class="nav-item" onclick="switchPage('reports', this)">
                    <i class="fas fa-chart-line"></i>
                    <span>報表</span>
                </div>
                <div class="nav-item" onclick="switchPage('settings', this)">
                    <i class="fas fa-cog"></i>
                    <span>設定</span>
                </div>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="alert-modal" class="modal">
        <div class="modal-content text-center">
            <h3 id="alert-title" class="text-lg font-bold mb-2">提示</h3>
            <p id="alert-message" class="text-gray-600 mb-4"></p>
            <button onclick="closeModal('alert-modal')" class="btn btn-primary w-full">確定</button>
        </div>
    </div>

    <div id="action-modal" class="modal">
        <div class="modal-content">
            <h3 id="action-title" class="text-lg font-bold mb-4">操作</h3>
            <input type="hidden" id="action-id">
            <input type="hidden" id="action-lot">
            <input type="hidden" id="action-expiry">
            <input type="hidden" id="action-name">
            
            <div class="mb-3 bg-gray-50 p-2 rounded text-sm">
                <div>目前庫存：<span id="modal-current-qty" class="font-bold text-blue-600"></span></div>
                <div>批號：<span id="modal-lot" class="font-mono text-xs"></span></div>
                <div>效期：<span id="modal-expiry" class="text-xs"></span></div>
            </div>

            <label class="block text-sm font-medium text-gray-700 mb-1">數量</label>
            <input type="number" id="action-qty" class="input-field" min="1">

            <label class="block text-sm font-medium text-gray-700 mb-1">備註 (選填)</label>
            <input type="text" id="action-note" class="input-field" placeholder="例如：損壞、贈品...">

            <div id="safety-stock-div" class="hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">叫貨門檻 (安全庫存)</label>
                <input type="number" id="action-min-qty" class="input-field">
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('action-modal')" class="btn bg-gray-300 w-1/2">取消</button>
                <button id="btn-confirm-action" class="btn btn-primary w-1/2">確認</button>
            </div>
        </div>
    </div>

    <div id="new-item-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-lg font-bold mb-4">新增品項 / 入庫</h3>
            <input type="text" id="new-id" class="input-field" placeholder="品項 ID (必填)">
            <input type="text" id="new-name" class="input-field" placeholder="品項名稱 (必填)">
            <input type="text" id="new-category" class="input-field" placeholder="分類">
            <input type="number" id="new-qty" class="input-field" placeholder="入庫數量">
            <input type="number" id="new-price" class="input-field" placeholder="單價">
            <input type="text" id="new-vendor" class="input-field" placeholder="廠商">
            <input type="date" id="new-expiry" class="input-field">
            <input type="text" id="new-lot" class="input-field" placeholder="批號">
            <input type="number" id="new-min-qty" class="input-field" placeholder="叫貨門檻">
            
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal('new-item-modal')" class="btn bg-gray-300 w-1/2">取消</button>
                <button onclick="submitNewItem()" class="btn btn-success w-1/2">送出</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypbBGczyPbjs0nd_d0NasMaXi0UjZjspq3VhWuCb6LsJyXhMPI5FGSWRUBE1nME35TPA/exec';
        
        let currentUser = null;
        let authToken = null;
        let allItems = [];
        let html5QrCode = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('clinic_user');
            const savedToken = localStorage.getItem('clinic_token');
            
            if (savedUser && savedToken) {
                currentUser = JSON.parse(savedUser);
                authToken = savedToken;
                showApp();
                loadData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        function handleLogin() {
            const account = document.getElementById('login-account').value.trim();
            const password = document.getElementById('login-password').value.trim();
            const errorEl = document.getElementById('login-error');
            
            if (!account || !password) {
                errorEl.textContent = '請輸入帳號和密碼';
                errorEl.classList.remove('hidden');
                return;
            }

            errorEl.textContent = '登入中...';
            errorEl.classList.remove('hidden');

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'login', account, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    currentUser = data.user;
                    authToken = data.token;
                    localStorage.setItem('clinic_user', JSON.stringify(currentUser));
                    localStorage.setItem('clinic_token', authToken);
                    showApp();
                    loadData();
                } else {
                    errorEl.textContent = data.error || '登入失敗';
                }
            })
            .catch(err => {
                errorEl.textContent = '網路錯誤：' + err.message;
            });
        }

        function logout() {
            if(confirm('確定要登出嗎？')) {
                localStorage.removeItem('clinic_user');
                localStorage.removeItem('clinic_token');
                location.reload();
            }
        }

        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('user-display-name').textContent = currentUser.name;
        }

        async function loadData() {
            showLoading('inventoryList');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getData&t=${new Date().getTime()}`);
                const data = await response.json();
                
                if (data.success) {
                    allItems = data.items || [];
                    renderInventory();
                    renderCategories();
                    renderLogs(data.logs || []);
                    
                    if (data.settings && data.settings.reportEmail) {
                        document.getElementById('settingEmail').value = data.settings.reportEmail;
                    }
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('inventoryList').innerHTML = `<div class="text-red-500 text-center p-4">載入失敗：${error.message}<br><button onclick="loadData()" class="mt-2 text-blue-500 underline">重試</button></div>`;
                if (error.message.includes('未授權')) {
                    logout();
                }
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventoryList');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const catFilter = document.getElementById('filterCategory').value;
            
            list.innerHTML = '';

            const filtered = allItems.filter(item => {
                const matchSearch = (item.name && item.name.toLowerCase().includes(search)) || 
                                    (item.id && String(item.id).toLowerCase().includes(search)) ||
                                    (item.lot && item.lot.toLowerCase().includes(search));
                const matchCat = !catFilter || item.category === catFilter;
                return matchSearch && matchCat;
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-500 py-8">無符合品項</div>';
                return;
            }

            // 排序：ID -> 效期
            filtered.sort((a, b) => {
                if (a.id !== b.id) return a.id.localeCompare(b.id);
                return new Date(a.expiry || '2099-12-31') - new Date(b.expiry || '2099-12-31');
            });

            filtered.forEach(item => {
                const lastStocktake = item.lastStocktake ? new Date(item.lastStocktake) : null;
                const now = new Date();
                let statusClass = 'status-err';
                let statusText = '未盤點';
                
                if (lastStocktake) {
                    const diffTime = Math.abs(now - lastStocktake);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    // 檢查是否為今天
                    if (now.getFullYear() === lastStocktake.getFullYear() && 
                        now.getMonth() === lastStocktake.getMonth() && 
                        now.getDate() === lastStocktake.getDate()) {
                        statusClass = 'status-ok';
                        statusText = '今日已盤點';
                    } else if (diffDays <= 7) {
                        statusClass = 'status-warn';
                        statusText = `${diffDays}天前`;
                    }
                }

                const isLow = item.qty <= (item.minQty || 0);
                
                const card = document.createElement('div');
                card.className = `card p-4 mb-3 ${statusClass} relative`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg text-gray-800">${item.name}</h3>
                            <div class="text-xs text-gray-500 mt-1">
                                ID: ${item.id} | 批號: <span class="font-mono">${item.lot || '-'}</span>
                            </div>
                            <div class="text-xs text-gray-500">
                                效期: ${item.expiry || '無'} | 分類: ${item.category}
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold ${isLow ? 'text-red-600' : 'text-gray-800'}">${item.qty}</div>
                            <div class="text-xs text-gray-500">庫存</div>
                            ${isLow ? '<span class="badge badge-low mt-1 inline-block">低於門檻</span>' : ''}
                        </div>
                    </div>
                    
                    <div class="mt-3 pt-3 border-t border-gray-100 flex justify-between items-center text-xs">
                        <span class="${statusClass === 'status-ok' ? 'text-green-600' : (statusClass === 'status-warn' ? 'text-orange-500' : 'text-red-500')} font-bold">
                            <i class="fas fa-clock"></i> ${statusText}
                        </span>
                        <div class="space-x-2">
                            <button onclick="openActionModal('in', '${item.id}', '${item.lot}', '${item.expiry}', '${item.name}', ${item.qty})" class="text-blue-600 font-bold hover:bg-blue-50 px-2 py-1 rounded">入庫</button>
                            <button onclick="openActionModal('out', '${item.id}', '${item.lot}', '${item.expiry}', '${item.name}', ${item.qty})" class="text-red-600 font-bold hover:bg-red-50 px-2 py-1 rounded">領用</button>
                            <button onclick="openActionModal('check', '${item.id}', '${item.lot}', '${item.expiry}', '${item.name}', ${item.qty}, ${item.minQty || 0})" class="text-green-600 font-bold hover:bg-green-50 px-2 py-1 rounded">盤點</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderCategories() {
            const cats = [...new Set(allItems.map(i => i.category).filter(c => c))];
            const select = document.getElementById('filterCategory');
            select.innerHTML = '<option value="">全部分類</option>';
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                select.appendChild(opt);
            });
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('logList');
            tbody.innerHTML = '';
            logs.slice(-20).reverse().forEach(log => {
                const tr = document.createElement('tr');
                tr.className = 'border-b hover:bg-gray-50';
                const item = allItems.find(i => i.id == log.id);
                const name = item ? item.name : log.id;
                
                let typeColor = 'text-gray-600';
                if(log.type.includes('入庫')) typeColor = 'text-green-600';
                if(log.type.includes('領用')) typeColor = 'text-red-600';
                if(log.type.includes('盤點')) typeColor = 'text-blue-600';

                tr.innerHTML = `
                    <td class="p-3 text-xs text-gray-500">${new Date(log.time).toLocaleString()}</td>
                    <td class="p-3 font-bold ${typeColor}">${log.type}</td>
                    <td class="p-3 text-sm">${name}</td>
                    <td class="p-3 font-mono">${log.qty > 0 ? '+' : ''}${log.qty}</td>
                    <td class="p-3 text-xs text-gray-500">${log.user}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openActionModal(type, id, lot, expiry, name, currentQty, minQty = 0) {
            document.getElementById('action-modal').style.display = 'block';
            document.getElementById('action-title').textContent = 
                type === 'in' ? '📥 入庫' : (type === 'out' ? '📤 領用' : '📋 盤點');
            
            document.getElementById('action-id').value = id;
            document.getElementById('action-lot').value = lot;
            document.getElementById('action-expiry').value = expiry;
            document.getElementById('action-name').value = name;
            
            document.getElementById('modal-current-qty').textContent = currentQty;
            document.getElementById('modal-lot').textContent = lot || '-';
            document.getElementById('modal-expiry').textContent = expiry || '無';
            
            document.getElementById('action-qty').value = '';
            document.getElementById('action-note').value = '';
            document.getElementById('action-min-qty').value = minQty;

            const confirmBtn = document.getElementById('btn-confirm-action');
            const safetyDiv = document.getElementById('safety-stock-div');
            
            safetyDiv.classList.toggle('hidden', type !== 'check');

            confirmBtn.onclick = () => submitAction(type);
            confirmBtn.className = `btn w-1/2 ${type === 'in' ? 'btn-success' : (type === 'out' ? 'btn-danger' : 'btn-primary')}`;
        }

        async function submitAction(type) {
            const id = document.getElementById('action-id').value;
            const lot = document.getElementById('action-lot').value;
            const expiry = document.getElementById('action-expiry').value;
            const qty = parseInt(document.getElementById('action-qty').value);
            const note = document.getElementById('action-note').value;
            const minQty = document.getElementById('action-min-qty').value;
            const name = document.getElementById('action-name').value;

            if (!qty || qty <= 0) return showAlert('錯誤', '數量必須大於 0');

            const payload = {
                action: 'write',
                token: authToken,
                type: type === 'in' ? '入庫' : (type === 'out' ? '領用' : '盤點'),
                id: id,
                lot: lot,
                expiry: expiry,
                qty: qty,
                note: note,
                name: name
            };

            if (type === 'check') {
                payload.minQty = minQty;
            }

            closeModal('action-modal');
            
            // 樂觀更新 UI (先更新畫面，再送後端)
            updateLocalData(payload);

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.success) {
                    // 後端回傳最新資料，同步狀態
                    allItems = result.items;
                    renderInventory();
                    renderLogs(result.logs);
                    showAlert('成功', '操作已完成');
                } else {
                    // 失敗則重新載入以還原正確數據
                    loadData();
                    showAlert('錯誤', result.error || '操作失敗');
                }
            } catch (error) {
                loadData();
                showAlert('錯誤', '網路錯誤：' + error.message);
            }
        }

        // 即時更新本地數據 (Optimistic UI)
        function updateLocalData(payload) {
            const itemIndex = allItems.findIndex(i => 
                i.id === payload.id && i.lot === payload.lot && i.expiry === payload.expiry
            );

            if (itemIndex !== -1) {
                const item = allItems[itemIndex];
                if (payload.type === '入庫') {
                    item.qty += payload.qty;
                } else if (payload.type === '領用') {
                    item.qty -= payload.qty;
                } else if (payload.type === '盤點') {
                    item.qty = payload.qty;
                    item.minQty = payload.minQty || item.minQty;
                    item.lastStocktake = new Date().toISOString();
                }
                renderInventory();
            }
        }

        async function submitNewItem() {
            const id = document.getElementById('new-id').value;
            const name = document.getElementById('new-name').value;
            const qty = parseInt(document.getElementById('new-qty').value);
            const category = document.getElementById('new-category').value;
            const price = document.getElementById('new-price').value;
            const vendor = document.getElementById('new-vendor').value;
            const expiry = document.getElementById('new-expiry').value;
            const lot = document.getElementById('new-lot').value;
            const minQty = document.getElementById('new-min-qty').value;

            if (!id || !name || !qty) return showAlert('錯誤', 'ID、名稱、數量為必填');

            const payload = {
                action: 'write',
                token: authToken,
                type: '新入庫建檔',
                id: id,
                name: name,
                qty: qty,
                category: category,
                price: price,
                vendor: vendor,
                expiry: expiry,
                lot: lot,
                minQty: minQty
            };

            closeModal('new-item-modal');
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.success) {
                    allItems = result.items;
                    renderInventory();
                    renderCategories();
                    showAlert('成功', '新增成功！');
                } else {
                    showAlert('錯誤', result.error);
                }
            } catch (error) {
                showAlert('錯誤', '網路錯誤：' + error.message);
            }
        }

        function saveSettings() {
            const email = document.getElementById('settingEmail').value;
            if(!email) return showAlert('錯誤', '請輸入 Email');
            
            const payload = {
                action: 'updateSettings',
                token: authToken,
                reportEnabled: true,
                reportEmail: email
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) showAlert('成功', '設定已儲存');
                else showAlert('錯誤', data.error);
            })
            .catch(err => showAlert('錯誤', err.message));
        }

        function sendMonthlyReport() {
            showAlert('提示', '月報功能需後端設定定時觸發。\n您可以手動前往 Google Apps Script 執行 sendConsumptionReport 函數。');
        }

        function startScan(mode) {
            const readerDiv = document.getElementById('reader');
            readerDiv.innerHTML = '';
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                stopScan();
                handleScannedCode(decodedText, mode);
            }).catch(err => {
                showAlert('錯誤', '無法啟動相機：' + err);
            });
        }

        function stopScan() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').innerHTML = '';
                }).catch(err => console.log(err));
            }
        }

        function handleScannedCode(code, mode) {
            const item = allItems.find(i => i.id == code || i.lot == code);
            if (item) {
                openActionModal(mode, item.id, item.lot, item.expiry, item.name, item.qty);
            } else {
                if (mode === 'in') {
                    if(confirm(`掃描到新代碼：${code}\n是否為新品項入庫？`)) {
                        document.getElementById('new-item-modal').style.display = 'block';
                        document.getElementById('new-id').value = code;
                        document.getElementById('new-lot').value = code;
                    }
                } else {
                    showAlert('查無此品項', `代碼 ${code} 不存在於庫存中，無法領用。`);
                }
            }
        }

        function switchPage(pageId, navEl) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            navEl.classList.add('active');

            if (pageId === 'reports') {
                const totalItems = allItems.length;
                const totalQty = allItems.reduce((sum, i) => sum + (parseInt(i.qty)||0), 0);
                const lowStock = allItems.filter(i => i.qty <= (i.minQty||0)).length;
                document.getElementById('reportContent').innerHTML = `
                    <div class="grid grid-cols-3 gap-2 text-center mb-4">
                        <div class="bg-blue-50 p-2 rounded"><div class="text-xl font-bold text-blue-600">${totalItems}</div><div class="text-xs">品項數</div></div>
                        <div class="bg-green-50 p-2 rounded"><div class="text-xl font-bold text-green-600">${totalQty}</div><div class="text-xs">總庫存</div></div>
                        <div class="bg-red-50 p-2 rounded"><div class="text-xl font-bold text-red-600">${lowStock}</div><div class="text-xs">低庫存</div></div>
                    </div>
                    <p class="text-sm text-gray-600">詳細日誌請見下方表格。</p>
                `;
                document.getElementById('reportDateRange').textContent = new Date().toLocaleDateString();
            }
        }

        function openNewItemModal() {
            document.getElementById('new-item-modal').style.display = 'block';
            ['new-id', 'new-name', 'new-category', 'new-qty', 'new-price', 'new-vendor', 'new-expiry', 'new-lot', 'new-min-qty'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }

        function showModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function showAlert(title, msg) {
            document.getElementById('alert-title').textContent = title;
            document.getElementById('alert-message').textContent = msg;
            showModal('alert-modal');
        }

        function showLoading(elementId) {
            document.getElementById(elementId).innerHTML = '<div class="loading"></div>';
        }
    </script>
</body>
</html>
