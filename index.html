<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>牙科庫存盤點</title><script src="https://unpkg.com/html5-qrcode"></script><style>body{font:16px system-ui;margin:0;background:#f4f7fb;color:#1e293b}.wrap{max-width:760px;margin:auto;padding:16px}header{background:#fff;padding:12px 16px;display:flex;justify-content:space-between}button,input,select{font:inherit;padding:10px;border:1px solid #cbd5e1;border-radius:8px}button{font-weight:700;cursor:pointer}.primary{background:#2563eb;color:#fff}.hidden{display:none!important}.card{background:#fff;border-radius:12px;padding:14px;margin:12px 0}.row{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.reader{background:#000;min-height:250px;position:relative;border-radius:10px;overflow:hidden}.reader video{width:100%;height:250px;object-fit:cover}.count{position:absolute;top:10px;left:10px;background:#15803d;color:#fff;padding:8px 12px;border-radius:8px;font-weight:700;z-index:5}.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;padding:10px 15px;border-radius:8px;z-index:9}.ok{background:#15803d}#login{position:fixed;inset:0;background:#0008;display:grid;place-items:center;z-index:10}#login .card{width:min(360px,90vw)}li{list-style:none;padding:12px;background:#fff;margin:8px 0;border-radius:9px}</style></head><body><header><b>牙科智慧庫存</b><button id="session" class="hidden"></button></header><div class="wrap"><div id="toast" class="toast hidden"></div><div id="login"><div class="card"><h2>登入</h2><input id="account" placeholder="帳號"><input id="password" type="password" placeholder="密碼"><p><button id="loginBtn" class="primary">登入</button></p></div></div><div class="card"><div class="row"><b>物流式掃碼盤點</b><button id="start" class="primary">啟動相機</button><button id="finish" class="hidden">完成盤點並送出</button></div><p id="hint">請先啟動相機並掃描 QR Code 或一維碼。</p><div id="reader" class="reader hidden"><div id="cameraCount" class="count">已掃描 0 件</div></div><div id="pick" class="hidden"><p id="itemName"></p><label>選擇批次 <select id="batch"></select></label><button id="begin" class="primary">開始累計掃描</button></div></div><div class="card"><b>庫存批次</b><ul id="items"></ul></div></div><script>
const API_URL='https://script.google.com/macros/s/AKfycbypbBGczyPbjs0nd_d0NasMaXi0UjZjspq3VhWuCb6LsJyXhMPI5FGSWRUBE1nME35TPA/exec';let token='',expires=0,items=[],scanner=null,last=0,job=null,timer=0;
const $=x=>document.getElementById(x);function note(t,ok=false){$('toast').textContent=t;$('toast').className='toast '+(ok?'ok':'');setTimeout(()=>$('toast').classList.add('hidden'),2600)}async function api(d){const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({...d,token})});const x=JSON.parse(await r.text());if(!x.success)throw Error(x.error);return x}function tick(){const s=Math.ceil((expires-Date.now())/1000);if(s<=0){token='';$('session').classList.add('hidden');$('login').classList.remove('hidden');return}$('session').textContent=`剩餘 ${String(s/60|0).padStart(2,'0')}:${String(s%60).padStart(2,'0')}｜延長`}async function load(){const x=await api({action:'data'});items=x.items;$('items').innerHTML=items.map(i=>`<li><b>${i.name}</b><br>ID ${i.id}｜批號 ${i.lot||'未填'}｜效期 ${i.expiry||'未填'}｜庫存 ${i.qty}</li>`).join('')}function batches(id){return items.filter(x=>x.id===id&&x.qty>0).sort((a,b)=>(a.expiry||'9999').localeCompare(b.expiry||'9999'))}async function stop(){if(scanner){try{await scanner.stop();await scanner.clear()}catch(_){}scanner=null}}async function camera(){await stop();$('reader').classList.remove('hidden');scanner=new Html5Qrcode('reader');const config={fps:10,qrbox:(w,h)=>{const n=Math.min(300,Math.floor(Math.min(w,h)*.82));return{width:n,height:n}}};try{await scanner.start({facingMode:{ideal:'environment'}},config,scan,()=>{})}catch(e){try{const c=await Html5Qrcode.getCameras();await scanner.start(c[0].id,config,scan,()=>{})}catch(x){note('無法啟動相機：請允許相機權限');await stop()}}}async function scan(code){const now=Date.now();if(now-last<1000)return;last=now;if(job){if(code!==job.id)return note('請先完成目前品項盤點');job.count++;$('cameraCount').textContent=`已掃描 ${job.count} 件`;return}const list=batches(code);if(!list)return note('查無此條碼或無可用庫存');$('itemName').textContent=list[0].name+'（'+code+'）';$('batch').innerHTML=list.map(x=>`<option value="${items.indexOf(x)}">批號 ${x.lot||'未填'}｜效期 ${x.expiry}｜庫存 ${x.qty}</option>`).join('');$('pick').classList.remove('hidden');await stop()}$('begin').onclick=async()=>{const x=items[+$('batch').value];job={id:x.id,name:x.name,lot:x.lot,expiry:x.expiry,count:0};$('cameraCount').textContent='已掃描 0 件';$('pick').classList.add('hidden');$('finish').classList.remove('hidden');await camera();note('開始掃描累計','ok')};$('start').onclick=camera;$('finish').onclick=async()=>{if(!job||!job.count)return note('請至少掃描一件');try{await api({type:'盤點',...job,qty:job.count,note:'[物流掃碼盤點]'});note('盤點完成','ok');job=null;$('finish').classList.add('hidden');await stop();$('reader').classList.add('hidden');await load()}catch(e){note(e.message)}};$('loginBtn').onclick=async()=>{try{const x=await api({action:'login',account:$('account').value.trim(),password:$('password').value});token=x.token;expires=Date.now()+x.expiresIn*1000;$('login').classList.add('hidden');$('session').classList.remove('hidden');clearInterval(timer);timer=setInterval(tick,1000);tick();await load()}catch(e){note('登入失敗：'+e.message)}};$('session').onclick=async()=>{const p=prompt('再次輸入密碼以延長 30 分鐘');if(p===null)return;try{const x=await api({action:'renew',account:$('account').value.trim(),password:p});token=x.token;expires=Date.now()+x.expiresIn*1000;tick();note('登入已延長','ok')}catch(e){note('延長失敗：'+e.message)}};
</script></body></html>
