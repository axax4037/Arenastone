<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聖星診所庫存管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f3f4f6; padding-bottom: 80px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 16px; margin-bottom: 12px; transition: all 0.2s; border-left: 4px solid #e5e7eb; }
        .card:active { transform: scale(0.98); }
        .status-ok { border-left-color: #10b981; } /* 綠色：今日已盤點 */
        .status-warn { border-left-color: #f59e0b; } /* 琥珀色：7天內 */
        .status-danger { border-left-color: #ef4444; } /* 紅色：超過7天 */
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #6b7280; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #2563eb; font-weight: bold; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 4px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; border: none; cursor: pointer; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-secondary { background: #6b7280; color: white; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-low { background: #fee2e2; color: #ef4444; }
        .badge-ok { background: #d1fae5; color: #10b981; }
        .scanner-container { width: 100%; max-width: 400px; background: black; border-radius: 12px; overflow: hidden; }
        .fade-in { animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden-section { display: none; }
    </style>
</head>
<body>

<!-- 頂部導航 -->
<div class="bg-white shadow-sm p-4 sticky top-0 z-50">
    <div class="flex justify-between items-center max-w-2xl mx-auto">
        <h1 class="text-xl font-bold text-gray-800"><i class="fas fa-clinic-medical text-blue-600 mr-2"></i>聖星診所庫存</h1>
        <button onclick="openSettings()" class="text-gray-600"><i class="fas fa-cog text-xl"></i></button>
    </div>
</div>

<!-- 主要內容區 -->
<div id="app" class="max-w-2xl mx-auto p-4">
    <!-- 動態載入內容 -->
    <div id="loading" class="text-center py-10">
        <i class="fas fa-spinner fa-spin text-4xl text-blue-600 mb-4"></i>
        <p class="text-gray-500">載入資料中...</p>
    </div>
    <div id="error-msg" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
        <strong class="font-bold">錯誤!</strong>
        <span class="block sm:inline" id="error-text"></span>
    </div>
    <div id="inventory-list"></div>
    <div id="logs-list" class="hidden-section"></div>
    <div id="settings-view" class="hidden-section">
        <div class="card">
            <h2 class="text-lg font-bold mb-4">系統設定</h2>
            <label class="block text-sm font-medium text-gray-700">Google Sheet ID</label>
            <input type="text" id="sheet-id" placeholder="輸入試算表 ID">
            <p class="text-xs text-gray-500 mb-4">從網址複製 /d/ 和 /edit 之間的字串</p>
            
            <label class="block text-sm font-medium text-gray-700">月報收件信箱</label>
            <input type="email" id="report-email" value="mschen1116l@gmail.com">
            
            <div class="flex items-center mb-4">
                <input type="checkbox" id="report-enabled" class="w-4 h-4 text-blue-600">
                <label for="report-enabled" class="ml-2 text-sm text-gray-700">啟用自動月報</label>
            </div>

            <button onclick="saveSettings()" class="btn btn-primary">儲存設定</button>
        </div>
        <div class="card">
            <h3 class="font-bold mb-2">目前登入使用者</h3>
            <p id="current-user-display" class="text-gray-600">未登入 (將使用預設)</p>
            <input type="text" id="user-code" placeholder="輸入登入代號 (選填)" class="mt-2">
            <button onclick="setUser()" class="btn btn-secondary mt-2">設定使用者</button>
        </div>
    </div>
</div>

<!-- 底部導航列 -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="switchTab('inventory')">
        <i class="fas fa-boxes"></i>庫存
    </div>
    <div class="nav-item" onclick="openScanner('in')">
        <i class="fas fa-plus-circle"></i>入庫
    </div>
    <div class="nav-item" onclick="openScanner('out')">
        <i class="fas fa-minus-circle"></i>領用
    </div>
    <div class="nav-item" onclick="switchTab('logs')">
        <i class="fas fa-history"></i>日誌
    </div>
</div>

<!-- 通用 Modal -->
<div id="action-modal" class="modal">
    <div class="modal-content">
        <h2 id="modal-title" class="text-xl font-bold mb-4">操作</h2>
        <div id="modal-body"></div>
        <div class="flex gap-2 mt-4">
            <button onclick="closeModal()" class="btn btn-secondary flex-1">取消</button>
            <button id="modal-confirm-btn" class="btn btn-primary flex-1">確認</button>
        </div>
    </div>
</div>

<!-- 掃描器 Modal -->
<div id="scanner-modal" class="modal">
    <div class="modal-content text-center">
        <h2 class="text-xl font-bold mb-4">掃描條碼</h2>
        <div id="reader" class="scanner-container mb-4"></div>
        <p class="text-sm text-gray-500 mb-4">將鏡頭對準條碼或 QR Code</p>
        <button onclick="stopScanner()" class="btn btn-danger">關閉掃描器</button>
    </div>
</div>

<script>
// --- 設定與全域變數 ---
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbypbBGczyPbjs0nd_d0NasMaXi0UjZjspq3VhWuCb6LsJyXhMPI5FGSWRUBE1nME35TPA/exec';
let inventoryData = [];
let settingsData = {};
let currentUser = localStorage.getItem('clinic_user') || '系統管理員';
let html5QrCode = null;
let scanMode = ''; // 'in' or 'out'

// --- 初始化 ---
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('user-code').value = currentUser === '系統管理員' ? '' : currentUser;
    document.getElementById('current-user-display').textContent = currentUser;
    loadData();
});

// --- 資料載入 ---
async function loadData() {
    const sheetId = localStorage.getItem('sheet_id');
    if (!sheetId) {
        showError('請先至設定頁面輸入 Google Sheet ID');
        return;
    }

    try {
        const response = await fetch(`${SCRIPT_URL}?id=${sheetId}&t=${Date.now()}`);
        if (!response.ok) throw new Error('網路回應失敗');
        const result = await response.json();
        
        if (result.success === false) throw new Error(result.error || 'API 錯誤');
        
        inventoryData = result.items || [];
        settingsData = result.settings || {};
        
        // 同步設定到 UI
        document.getElementById('sheet-id').value = sheetId;
        document.getElementById('report-email').value = settingsData.reportEmail || 'mschen1116l@gmail.com';
        document.getElementById('report-enabled').checked = settingsData.reportEnabled || false;

        renderInventory();
        hideError();
    } catch (error) {
        showError(`載入失敗：${error.message}。請檢查網路或 Sheet ID。`);
        console.error(error);
    }
}

// --- 渲染庫存列表 ---
function renderInventory() {
    const container = document.getElementById('inventory-list');
    container.innerHTML = '';
    
    // 分組處理：同品項多批次
    const grouped = {};
    inventoryData.forEach(item => {
        if (!grouped[item.id]) grouped[item.id] = [];
        grouped[item.id].push(item);
    });

    Object.keys(grouped).forEach(id => {
        const batches = grouped[id];
        const mainItem = batches[0];
        
        // 計算總庫存與最低安全量
        const totalQty = batches.reduce((sum, b) => sum + (Number(b.qty) || 0), 0);
        const minQty = Number(mainItem.minQty) || 0;
        const isLowStock = totalQty <= minQty && totalQty > 0;

        // FEFO: 找出最早效期
        let earliestExpiry = '無效期';
        let soonestDate = null;
        batches.forEach(b => {
            if (b.expiry) {
                const d = new Date(b.expiry);
                if (!soonestDate || d < soonestDate) {
                    soonestDate = d;
                    earliestExpiry = b.expiry;
                }
            }
        });

        // 盤點狀態顏色邏輯
        let statusClass = 'status-ok'; // 預設綠色
        let lastStocktakeText = '未盤點';
        
        if (mainItem.lastStocktake) {
            const lastDate = new Date(mainItem.lastStocktake);
            const now = new Date();
            const diffTime = Math.abs(now - lastDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            // 格式化時間顯示
            if (diffDays === 0 && now.getDate() === lastDate.getDate()) {
                lastStocktakeText = `今日 ${lastDate.getHours()}:${String(lastDate.getMinutes()).padStart(2, '0')}`;
                statusClass = 'status-ok';
            } else if (diffDays <= 7) {
                lastStocktakeText = `${diffDays}天前`;
                statusClass = 'status-warn';
            } else {
                lastStocktakeText = `${diffDays}天前 (需盤點)`;
                statusClass = 'status-danger';
            }
        }

        const card = document.createElement('div');
        card.className = `card ${statusClass} fade-in`;
        card.innerHTML = `
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h3 class="font-bold text-lg text-gray-800">${mainItem.name}</h3>
                    <p class="text-xs text-gray-500">ID: ${mainItem.id} | 分類: ${mainItem.category}</p>
                </div>
                <div class="text-right">
                    <span class="text-2xl font-bold ${isLowStock ? 'text-red-600' : 'text-gray-800'}">${totalQty}</span>
                    <p class="text-xs text-gray-500">單位</p>
                    ${isLowStock ? '<span class="badge badge-low mt-1">低庫存</span>' : ''}
                </div>
            </div>
            
            <div class="bg-gray-50 p-2 rounded text-xs mb-2">
                <div class="flex justify-between">
                    <span>📅 最早效期:</span>
                    <span class="font-mono ${soonestDate && soonestDate < new Date() ? 'text-red-600 font-bold' : ''}">${earliestExpiry}</span>
                </div>
                <div class="flex justify-between mt-1">
                    <span>📝 最後盤點:</span>
                    <span class="${statusClass === 'status-danger' ? 'text-red-600 font-bold' : 'text-gray-600'}">${lastStocktakeText}</span>
                </div>
            </div>

            <div class="border-t pt-2 mt-2">
                <p class="text-xs font-bold text-gray-500 mb-1">批次詳情 (${batches.length}):</p>
                <div class="grid grid-cols-2 gap-2">
                    ${batches.map((b, idx) => `
                        <div class="bg-white border rounded p-1 text-xs">
                            <div class="flex justify-between">
                                <span class="font-bold">批號: ${b.lot || '-'}</span>
                                <span>${b.qty}</span>
                            </div>
                            <div class="text-gray-500">${b.expiry || '無效期'}</div>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="flex gap-2 mt-4">
                <button onclick="openManualAction('in', '${mainItem.id}')" class="btn btn-success flex-1 text-sm py-2"><i class="fas fa-plus mr-1"></i>入庫</button>
                <button onclick="openManualAction('out', '${mainItem.id}')" class="btn btn-danger flex-1 text-sm py-2"><i class="fas fa-minus mr-1"></i>領用</button>
                <button onclick="openStocktake('${mainItem.id}')" class="btn btn-primary flex-1 text-sm py-2"><i class="fas fa-clipboard-check mr-1"></i>盤點</button>
            </div>
        `;
        container.appendChild(card);
    });
}

// --- 渲染日誌 ---
function renderLogs(logs) {
    const container = document.getElementById('logs-list');
    container.innerHTML = '';
    if (!logs || logs.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-10">尚無紀錄</p>';
        return;
    }
    
    logs.slice().reverse().forEach(log => {
        const div = document.createElement('div');
        div.className = 'card py-2';
        div.innerHTML = `
            <div class="flex justify-between text-xs text-gray-500 mb-1">
                <span>${log.time}</span>
                <span class="font-bold ${log.type === '領用' ? 'text-red-500' : 'text-green-600'}">${log.type}</span>
            </div>
            <div class="font-bold text-gray-800">${log.id} <span class="text-gray-500 font-normal">x ${log.qty}</span></div>
            <div class="text-xs text-gray-500">經手人: ${log.user || '-'} | 批號: ${log.lot || '-'}</div>
        `;
        container.appendChild(div);
    });
}

// --- 操作功能 ---
function openManualAction(type, id) {
    const item = inventoryData.find(i => i.id === id);
    if (!item) return;
    
    const modalBody = document.getElementById('modal-body');
    document.getElementById('modal-title').innerText = type === 'in' ? '手動入庫' : '手動領用';
    
    // 自動帶入當前使用者，但隱藏輸入框 (根據需求：操作者不用輸入，自動帶入)
    // 這裡我們不顯示輸入框，直接在背景處理
    
    modalBody.innerHTML = `
        <p class="mb-2 text-gray-600">品項：<strong>${item.name}</strong> (目前: ${item.qty})</p>
        <label class="text-sm text-gray-600">數量</label>
        <input type="number" id="action-qty" value="1" min="1">
        <label class="text-sm text-gray-600">備註 (選填)</label>
        <input type="text" id="action-note" placeholder="例如：補充庫存...">
        <input type="hidden" id="action-lot" value="">
        <input type="hidden" id="action-expiry" value="">
        <p class="text-xs text-gray-400 mt-2">* 經手人將自動記錄為：${currentUser}</p>
    `;
    
    document.getElementById('modal-confirm-btn').onclick = () => submitAction(type, id);
    document.getElementById('action-modal').style.display = 'flex';
}

function openStocktake(id) {
    const item = inventoryData.find(i => i.id === id);
    if (!item) return;
    
    const modalBody = document.getElementById('modal-body');
    document.getElementById('modal-title').innerText = '庫存盤點';
    
    modalBody.innerHTML = `
        <p class="mb-2 text-gray-600">品項：<strong>${item.name}</strong></p>
        <p class="text-sm text-gray-500 mb-4">系統將更新「最後盤點時間」為現在</p>
        <label class="text-sm text-gray-600">實際清點數量</label>
        <input type="number" id="action-qty" value="${item.qty}" min="0">
        <label class="text-sm text-gray-600">調整安全庫存門檻 (選填)</label>
        <input type="number" id="action-min-qty" value="${item.minQty}" placeholder="保持不變留空">
        <p class="text-xs text-gray-400 mt-2">* 經手人將自動記錄為：${currentUser}</p>
    `;
    
    document.getElementById('modal-confirm-btn').onclick = () => submitAction('stocktake', id);
    document.getElementById('action-modal').style.display = 'flex';
}

async function submitAction(type, id) {
    const qty = document.getElementById('action-qty').value;
    const note = document.getElementById('action-note')?.value || '';
    const minQty = document.getElementById('action-min-qty')?.value;
    const lot = document.getElementById('action-lot')?.value || '';
    const expiry = document.getElementById('action-expiry')?.value || '';
    
    if (!qty || qty < 0) { alert('請輸入有效數量'); return; }

    const item = inventoryData.find(i => i.id === id);
    let typeName = '';
    if (type === 'in') typeName = '手動入庫';
    else if (type === 'out') typeName = '領用';
    else if (type === 'stocktake') typeName = '盤點';

    const payload = {
        type: typeName,
        id: id,
        name: item.name,
        category: item.category,
        qty: qty,
        user: currentUser, // 自動帶入
        note: note,
        lot: lot,
        expiry: expiry,
        price: item.price || 0,
        minQty: minQty
    };

    closeModal();
    showLoading(true);

    try {
        // 使用 no-cors 模式或標準 POST，這裡嘗試標準 POST 並處理 CORS
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' }, // 避免 preflight
            body: JSON.stringify(payload)
        });
        
        const text = await response.text();
        if (text.includes('Success') || text.includes('success')) {
            alert('操作成功！');
            loadData(); // 即時刷新
        } else {
            alert('操作失敗：' + text);
        }
    } catch (error) {
        console.error(error);
        alert('發送請求時發生錯誤，請檢查網路。但後端可能已寫入，請重新整理確認。');
        loadData();
    } finally {
        showLoading(false);
    }
}

// --- 掃描器功能 ---
function openScanner(mode) {
    scanMode = mode;
    document.getElementById('scanner-modal').style.display = 'flex';
    
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };
    
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => { alert('無法啟動相機：' + err); stopScanner(); });
}

function onScanSuccess(decodedText) {
    stopScanner();
    // 假設掃描到的是 ID，尋找對應品項
    const item = inventoryData.find(i => i.id === decodedText || i.name === decodedText);
    
    if (item) {
        if (scanMode === 'in') openManualAction('in', item.id);
        else openManualAction('out', item.id);
    } else {
        alert('找不到此條碼對應的品項 (ID: ' + decodedText + ')');
        // 可選擇開啟新物品建立流程
    }
}

function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            document.getElementById('scanner-modal').style.display = 'none';
            html5QrCode = null;
        }).catch(err => console.error(err));
    }
}

// --- 設定與工具函數 ---
function switchTab(tab) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    
    document.getElementById('inventory-list').classList.add('hidden-section');
    document.getElementById('logs-list').classList.add('hidden-section');
    document.getElementById('settings-view').classList.add('hidden-section');
    
    if (tab === 'inventory') {
        document.getElementById('inventory-list').classList.remove('hidden-section');
        renderInventory();
    } else if (tab === 'logs') {
        document.getElementById('logs-list').classList.remove('hidden-section');
        // 簡單展示，實際可從 inventoryData 或單獨 API 獲取
        // 這裡為了演示，假設 logs 在全域變數中或由 loadData 一併載入
        // 注意：原 doGet 有回傳 logs，需確保有存到全域變數
        // 修改 loadData 以保存 logs
        renderLogs(window.allLogs || []); 
    } else if (tab === 'settings') {
        document.getElementById('settings-view').classList.remove('hidden-section');
    }
}

// 修正 loadData 以保存 logs
const originalLoadData = loadData;
loadData = async function() {
    const sheetId = localStorage.getItem('sheet_id');
    if (!sheetId) { showError('請先至設定頁面輸入 Google Sheet ID'); return; }
    try {
        const response = await fetch(`${SCRIPT_URL}?id=${sheetId}&t=${Date.now()}`);
        if (!response.ok) throw new Error('網路回應失敗');
        const result = await response.json();
        if (result.success === false) throw new Error(result.error);
        inventoryData = result.items || [];
        window.allLogs = result.logs || []; // 保存日誌
        settingsData = result.settings || {};
        document.getElementById('sheet-id').value = sheetId;
        document.getElementById('report-email').value = settingsData.reportEmail || 'mschen1116l@gmail.com';
        document.getElementById('report-enabled').checked = settingsData.reportEnabled || false;
        renderInventory();
        hideError();
    } catch (error) { showError(`載入失敗：${error.message}`); console.error(error); }
}

function openSettings() { switchTab('settings'); }

function saveSettings() {
    const sheetId = document.getElementById('sheet-id').value.trim();
    const email = document.getElementById('report-email').value;
    const enabled = document.getElementById('report-enabled').checked;
    
    if (!sheetId) { alert('請輸入 Sheet ID'); return; }
    
    localStorage.setItem('sheet_id', sheetId);
    
    // 傳送設定到後端
    fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ type: '更新設定', reportEnabled: enabled, reportEmail: email })
    }).then(() => {
        alert('設定已儲存！');
        loadData();
    }).catch(err => alert('儲存失敗：' + err));
}

function setUser() {
    const code = document.getElementById('user-code').value.trim();
    if (code) {
        currentUser = code;
        localStorage.setItem('clinic_user', code);
        document.getElementById('current-user-display').textContent = code;
        alert(`使用者已設定為：${code}`);
    }
}

function closeModal() { document.getElementById('action-modal').style.display = 'none'; }
function showLoading(show) { document.getElementById('loading').style.display = show ? 'block' : 'none'; }
function showError(msg) { document.getElementById('error-text').innerText = msg; document.getElementById('error-msg').classList.remove('hidden'); }
function hideError() { document.getElementById('error-msg').classList.add('hidden'); }

// 點擊遮罩關閉 Modal
window.onclick = function(event) {
    if (event.target == document.getElementById('action-modal')) closeModal();
    if (event.target == document.getElementById('scanner-modal')) stopScanner();
}
</script>
</body>
</html>
